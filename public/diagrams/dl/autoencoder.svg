<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 465 200" font-family="Inter, sans-serif">
  <defs>
    <style>
      .title { fill: #2B2A26; font-size: 14px; font-weight: 700; text-anchor: middle; }
      .label { fill: #7A756A; font-size: 10px; text-anchor: middle; }
      .box { rx: 4; stroke-width: 2; }
      .enc { fill: #D4E8D4; stroke: #4F7A5C; }
      .bottleneck { fill: #E8D4E8; stroke: #8A5A8A; }
      .dec { fill: #F1E0D6; stroke: #C96A45; }
      .txt { fill: #2B2A26; font-size: 10px; font-weight: 600; text-anchor: middle; dominant-baseline: central; }
      .line { stroke: #7A756A; stroke-width: 1.5; fill: none; marker-end: url(#a3); }
    </style>
    <marker id="a3" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon fill="#7A756A" points="0,0 7,2.5 0,5"/>
    </marker>
  </defs>

  <text class="title" x="232.5" y="18">Autoencoder</text>

  <rect class="box enc" x="15" y="60" width="55" height="55"/>
  <text class="txt" x="42.5" y="78">Input</text>
  <text class="txt" x="42.5" y="92" font-size="8">(784)</text>

  <line class="line" x1="70" y1="87.5" x2="90" y2="87.5"/>
  <rect class="box enc" x="90" y="65" width="50" height="45"/>
  <text class="txt" x="115" y="87.5">256</text>

  <line class="line" x1="140" y1="87.5" x2="155" y2="87.5"/>
  <rect class="box enc" x="155" y="70" width="45" height="35"/>
  <text class="txt" x="177.5" y="87.5">64</text>

  <line class="line" x1="200" y1="87.5" x2="215" y2="87.5"/>
  <rect class="box bottleneck" x="215" y="75" width="40" height="25"/>
  <text class="txt" x="235" y="87.5">z (16)</text>

  <line class="line" x1="255" y1="87.5" x2="270" y2="87.5"/>
  <rect class="box dec" x="270" y="70" width="45" height="35"/>
  <text class="txt" x="292.5" y="87.5">64</text>

  <line class="line" x1="315" y1="87.5" x2="330" y2="87.5"/>
  <rect class="box dec" x="330" y="65" width="50" height="45"/>
  <text class="txt" x="355" y="87.5">256</text>

  <line class="line" x1="380" y1="87.5" x2="395" y2="87.5"/>
  <rect class="box dec" x="395" y="60" width="55" height="55"/>
  <text class="txt" x="422.5" y="78">Output</text>
  <text class="txt" x="422.5" y="92" font-size="8">(784)</text>

  <text class="label" x="145" y="45">Encoder</text>
  <text class="label" x="235" y="45">Bottleneck</text>
  <text class="label" x="325" y="45">Decoder</text>

  <path d="M 42.5,117 Q 42.5,155 232.5,155 Q 422.5,155 422.5,117" fill="none" stroke="#C96A45" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text class="label" x="232.5" y="175">Loss = ||Input − Output||²</text>
</svg>
