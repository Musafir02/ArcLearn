<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" font-family="Inter, sans-serif">
  <defs>
    <style>
      .title { fill: #2B2A26; font-size: 14px; font-weight: 700; text-anchor: middle; }
      .label { fill: #7A756A; font-size: 10px; text-anchor: middle; }
      .node-in { fill: #D4E8D4; stroke: #4F7A5C; stroke-width: 2; }
      .node-hid { fill: #D6DCE8; stroke: #5A6A8A; stroke-width: 2; }
      .node-out { fill: #F1E0D6; stroke: #C96A45; stroke-width: 2; }
      .txt { fill: #2B2A26; font-size: 10px; font-weight: 600; text-anchor: middle; dominant-baseline: central; }
      .conn { stroke: #C9C4B8; stroke-width: 1; }
    </style>
  </defs>

  <text class="title" x="200" y="20">Neural Network</text>

  <g class="conn">
    <line x1="76" y1="80" x2="144" y2="80"/><line x1="76" y1="80" x2="144" y2="125"/>
    <line x1="76" y1="80" x2="144" y2="170"/><line x1="76" y1="80" x2="144" y2="215"/>
    <line x1="76" y1="80" x2="144" y2="260"/>
    <line x1="76" y1="125" x2="144" y2="80"/><line x1="76" y1="125" x2="144" y2="125"/>
    <line x1="76" y1="125" x2="144" y2="170"/><line x1="76" y1="125" x2="144" y2="215"/>
    <line x1="76" y1="125" x2="144" y2="260"/>
    <line x1="76" y1="170" x2="144" y2="80"/><line x1="76" y1="170" x2="144" y2="125"/>
    <line x1="76" y1="170" x2="144" y2="170"/><line x1="76" y1="170" x2="144" y2="215"/>
    <line x1="76" y1="170" x2="144" y2="260"/>
    <line x1="76" y1="215" x2="144" y2="80"/><line x1="76" y1="215" x2="144" y2="125"/>
    <line x1="76" y1="215" x2="144" y2="170"/><line x1="76" y1="215" x2="144" y2="215"/>
    <line x1="76" y1="215" x2="144" y2="260"/>
  </g>

  <g class="conn">
    <line x1="176" y1="80" x2="254" y2="95"/><line x1="176" y1="80" x2="254" y2="140"/>
    <line x1="176" y1="80" x2="254" y2="185"/><line x1="176" y1="80" x2="254" y2="230"/>
    <line x1="176" y1="125" x2="254" y2="95"/><line x1="176" y1="125" x2="254" y2="140"/>
    <line x1="176" y1="125" x2="254" y2="185"/><line x1="176" y1="125" x2="254" y2="230"/>
    <line x1="176" y1="170" x2="254" y2="95"/><line x1="176" y1="170" x2="254" y2="140"/>
    <line x1="176" y1="170" x2="254" y2="185"/><line x1="176" y1="170" x2="254" y2="230"/>
    <line x1="176" y1="215" x2="254" y2="95"/><line x1="176" y1="215" x2="254" y2="140"/>
    <line x1="176" y1="215" x2="254" y2="185"/><line x1="176" y1="215" x2="254" y2="230"/>
    <line x1="176" y1="260" x2="254" y2="95"/><line x1="176" y1="260" x2="254" y2="140"/>
    <line x1="176" y1="260" x2="254" y2="185"/><line x1="176" y1="260" x2="254" y2="230"/>
  </g>

  <g class="conn">
    <line x1="286" y1="95" x2="344" y2="120"/><line x1="286" y1="95" x2="344" y2="185"/>
    <line x1="286" y1="140" x2="344" y2="120"/><line x1="286" y1="140" x2="344" y2="185"/>
    <line x1="286" y1="185" x2="344" y2="120"/><line x1="286" y1="185" x2="344" y2="185"/>
    <line x1="286" y1="230" x2="344" y2="120"/><line x1="286" y1="230" x2="344" y2="185"/>
  </g>

  <text class="label" x="60" y="48">Input</text>
  <circle class="node-in" cx="60" cy="80" r="16"/><text class="txt" x="60" y="80">x₁</text>
  <circle class="node-in" cx="60" cy="125" r="16"/><text class="txt" x="60" y="125">x₂</text>
  <circle class="node-in" cx="60" cy="170" r="16"/><text class="txt" x="60" y="170">x₃</text>
  <circle class="node-in" cx="60" cy="215" r="16"/><text class="txt" x="60" y="215">x₄</text>

  <text class="label" x="160" y="48">Hidden 1</text>
  <circle class="node-hid" cx="160" cy="80" r="16"/><text class="txt" x="160" y="80">h₁</text>
  <circle class="node-hid" cx="160" cy="125" r="16"/><text class="txt" x="160" y="125">h₂</text>
  <circle class="node-hid" cx="160" cy="170" r="16"/><text class="txt" x="160" y="170">h₃</text>
  <circle class="node-hid" cx="160" cy="215" r="16"/><text class="txt" x="160" y="215">h₄</text>
  <circle class="node-hid" cx="160" cy="260" r="16"/><text class="txt" x="160" y="260">h₅</text>

  <text class="label" x="270" y="48">Hidden 2</text>
  <circle class="node-hid" cx="270" cy="95" r="16"/><text class="txt" x="270" y="95">h₁</text>
  <circle class="node-hid" cx="270" cy="140" r="16"/><text class="txt" x="270" y="140">h₂</text>
  <circle class="node-hid" cx="270" cy="185" r="16"/><text class="txt" x="270" y="185">h₃</text>
  <circle class="node-hid" cx="270" cy="230" r="16"/><text class="txt" x="270" y="230">h₄</text>

  <text class="label" x="360" y="48">Output</text>
  <circle class="node-out" cx="360" cy="120" r="16"/><text class="txt" x="360" y="120">ŷ₁</text>
  <circle class="node-out" cx="360" cy="185" r="16"/><text class="txt" x="360" y="185">ŷ₂</text>
</svg>
