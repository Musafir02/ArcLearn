<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 260" font-family="Inter, sans-serif">
  <defs>
    <style>
      .title { fill: #2B2A26; font-size: 14px; font-weight: 700; text-anchor: middle; }
      .label { fill: #7A756A; font-size: 9px; text-anchor: middle; }
      .sub { fill: #555047; font-size: 9px; font-weight: 600; text-anchor: middle; }
      .box { rx: 4; stroke-width: 2; }
      .input { fill: #D6DCE8; stroke: #5A6A8A; }
      .grid-box { fill: #D4E8D4; stroke: #4F7A5C; }
      .pred { fill: #F1E0D6; stroke: #C96A45; }
      .nms { fill: #E8D4E8; stroke: #8A5A8A; }
      .final { fill: #E8E4D4; stroke: #8A7A5A; }
      .txt { fill: #2B2A26; font-size: 10px; font-weight: 600; text-anchor: middle; dominant-baseline: central; }
      .dim { fill: #7A756A; font-size: 8px; text-anchor: middle; }
      .line { stroke: #7A756A; stroke-width: 1.5; fill: none; marker-end: url(#a); }
    </style>
    <marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon fill="#7A756A" points="0,0 7,2.5 0,5"/>
    </marker>
  </defs>

  <text class="title" x="220" y="18">YOLO Object Detection</text>

  <rect class="box input" x="10" y="40" width="60" height="50" rx="3"/>
  <rect x="15" y="44" width="14" height="20" fill="#A8BCD0" rx="1"/>
  <rect x="33" y="52" width="18" height="26" fill="#A8BCD0" rx="1"/>
  <rect x="54" y="48" width="10" height="18" fill="#A8BCD0" rx="1"/>
  <text class="label" x="40" y="108">Input Image</text>

  <line class="line" x1="70" y1="65" x2="88" y2="65"/>

  <rect class="box grid-box" x="88" y="35" width="70" height="60" rx="3"/>
  <line x1="88" y1="55" x2="158" y2="55" stroke="#4F7A5C" stroke-width="0.8"/>
  <line x1="88" y1="75" x2="158" y2="75" stroke="#4F7A5C" stroke-width="0.8"/>
  <line x1="111" y1="35" x2="111" y2="95" stroke="#4F7A5C" stroke-width="0.8"/>
  <line x1="134" y1="35" x2="134" y2="95" stroke="#4F7A5C" stroke-width="0.8"/>
  <text class="label" x="123" y="108">Divide into Grid</text>

  <line class="line" x1="158" y1="65" x2="176" y2="65"/>

  <rect class="box pred" x="176" y="30" width="80" height="70" rx="3"/>
  <text class="txt" x="216" y="44" font-size="8">Each Cell Predicts:</text>
  <rect class="box" x="182" y="52" width="16" height="14" fill="none" stroke="#C96A45" stroke-width="1.5" rx="1"/>
  <text fill="#2B2A26" font-size="7" font-weight="600" x="190" y="61" text-anchor="middle" dominant-baseline="central">B</text>
  <rect class="box" x="202" y="52" width="16" height="14" fill="none" stroke="#C96A45" stroke-width="1.5" rx="1"/>
  <text fill="#2B2A26" font-size="7" font-weight="600" x="210" y="61" text-anchor="middle" dominant-baseline="central">B</text>
  <rect class="box" x="222" y="52" width="16" height="14" fill="none" stroke="#C96A45" stroke-width="1.5" rx="1"/>
  <text fill="#2B2A26" font-size="7" font-weight="600" x="230" y="61" text-anchor="middle" dominant-baseline="central">B</text>
  <text fill="#555047" font-size="7" x="216" y="76" text-anchor="middle">+ class probs</text>
  <text fill="#555047" font-size="7" x="216" y="87" text-anchor="middle">+ confidence</text>
  <text class="label" x="216" y="108">BBoxes + Classes</text>

  <line class="line" x1="256" y1="65" x2="276" y2="65"/>

  <rect class="box nms" x="276" y="38" width="55" height="55" rx="3"/>
  <text class="txt" x="303.5" y="56" font-size="9">NMS</text>
  <text fill="#555047" font-size="7" x="303.5" y="70" text-anchor="middle">Non-Max</text>
  <text fill="#555047" font-size="7" x="303.5" y="81" text-anchor="middle">Suppression</text>
  <text class="label" x="303.5" y="108">Remove Duplicates</text>

  <line class="line" x1="331" y1="65" x2="345" y2="65"/>

  <rect class="box final" x="345" y="35" width="80" height="60" rx="3"/>
  <rect x="350" y="42" width="32" height="15" fill="none" stroke="#8A7A5A" stroke-width="2" rx="1"/>
  <text fill="#2B2A26" font-size="7" font-weight="600" x="366" y="50" text-anchor="middle" dominant-baseline="central">cat 0.95</text>
  <rect x="386" y="45" width="34" height="24" fill="none" stroke="#8A7A5A" stroke-width="2" rx="1"/>
  <text fill="#2B2A26" font-size="7" font-weight="600" x="403" y="57" text-anchor="middle" dominant-baseline="central">dog 0.88</text>
  <rect x="354" y="76" width="22" height="12" fill="none" stroke="#8A7A5A" stroke-width="2" rx="1"/>
  <text fill="#2B2A26" font-size="7" font-weight="600" x="365" y="82" text-anchor="middle" dominant-baseline="central">0.72</text>
  <text class="label" x="385" y="108">Final Detections</text>

  <text class="sub" x="220" y="145">S×S grid  |  B bounding boxes per cell  |  C class probabilities</text>

  <text class="label" x="100" y="170">Image with Grid Overlay</text>
  <g transform="translate(40,178)">
    <rect x="0" y="0" width="120" height="70" fill="#D6DCE8" rx="3"/>
    <rect x="10" y="20" width="30" height="40" fill="#A8BCD0" rx="1"/>
    <rect x="60" y="10" width="50" height="55" fill="#A8BCD0" rx="1"/>
    <line x1="40" y1="0" x2="40" y2="70" stroke="#4F7A5C" stroke-width="0.8" stroke-dasharray="3,2"/>
    <line x1="80" y1="0" x2="80" y2="70" stroke="#4F7A5C" stroke-width="0.8" stroke-dasharray="3,2"/>
    <line x1="0" y1="23" x2="120" y2="23" stroke="#4F7A5C" stroke-width="0.8" stroke-dasharray="3,2"/>
    <line x1="0" y1="47" x2="120" y2="47" stroke="#4F7A5C" stroke-width="0.8" stroke-dasharray="3,2"/>
    <rect x="6" y="16" width="38" height="48" fill="none" stroke="#C96A45" stroke-width="2" rx="1"/>
    <rect x="56" y="6" width="58" height="62" fill="none" stroke="#8A5A8A" stroke-width="2" rx="1"/>
    <text fill="#C96A45" font-size="7" font-weight="700" x="8" y="14">cat 0.95</text>
    <text fill="#8A5A8A" font-size="7" font-weight="700" x="58" y="4">dog 0.88</text>
  </g>

  <text class="label" x="260" y="170">NMS: Keep Best, Suppress Rest</text>
  <g transform="translate(195,178)">
    <rect x="0" y="5" width="40" height="30" fill="none" stroke="#C96A45" stroke-width="1.5" stroke-dasharray="3,2" rx="1"/>
    <text fill="#C96A45" font-size="7" x="2" y="3">0.6</text>
    <rect x="8" y="0" width="35" height="35" fill="none" stroke="#C96A45" stroke-width="1.5" rx="1"/>
    <text fill="#C96A45" font-size="7" font-weight="700" x="10" y="10">0.95</text>
    <rect x="20" y="8" width="32" height="28" fill="none" stroke="#C96A45" stroke-width="1.5" stroke-dasharray="3,2" rx="1"/>
    <text fill="#C96A45" font-size="7" x="22" y="32">0.4</text>
    <line x1="58" y1="20" x2="78" y2="20" stroke="#7A756A" stroke-width="1.5" marker-end="url(#a)"/>
    <rect x="82" y="5" width="35" height="30" fill="none" stroke="#8A5A8A" stroke-width="2.5" rx="1"/>
    <text fill="#8A5A8A" font-size="7" font-weight="700" x="84" y="3">0.95</text>
    <text fill="#555047" font-size="7" x="122" y="20" text-anchor="start">✓ kept</text>
    <text fill="#555047" font-size="7" x="122" y="32" text-anchor="start">✗ IoU &gt; 0.5</text>
  </g>
</svg>
