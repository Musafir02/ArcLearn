<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 240" font-family="Inter, sans-serif">
  <defs>
    <style>
      .title { fill: #2B2A26; font-size: 14px; font-weight: 700; text-anchor: middle; }
      .label { fill: #7A756A; font-size: 9px; text-anchor: middle; }
      .sub { fill: #555047; font-size: 8px; font-weight: 600; text-anchor: middle; }
      .box { rx: 4; stroke-width: 2; }
      .patch { fill: #D6DCE8; stroke: #5A6A8A; }
      .embed { fill: #D4E8D4; stroke: #4F7A5C; }
      .pos { fill: #E8E4D4; stroke: #8A7A5A; }
      .transformer { fill: #E8D4E8; stroke: #8A5A8A; }
      .mlp { fill: #F1E0D6; stroke: #C96A45; }
      .txt { fill: #2B2A26; font-size: 10px; font-weight: 600; text-anchor: middle; dominant-baseline: central; }
      .dim { fill: #7A756A; font-size: 8px; text-anchor: middle; dominant-baseline: central; }
      .line { stroke: #7A756A; stroke-width: 1.5; fill: none; marker-end: url(#a); }
    </style>
    <marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon fill="#7A756A" points="0,0 7,2.5 0,5"/>
    </marker>
  </defs>

  <text class="title" x="210" y="18">Vision Transformer (ViT)</text>

  <rect class="box patch" x="10" y="40" width="42" height="42"/>
  <line x1="10" y1="54" x2="52" y2="54" stroke="#5A6A8A" stroke-width="0.7"/>
  <line x1="10" y1="68" x2="52" y2="68" stroke="#5A6A8A" stroke-width="0.7"/>
  <line x1="24" y1="40" x2="24" y2="82" stroke="#5A6A8A" stroke-width="0.7"/>
  <line x1="38" y1="40" x2="38" y2="82" stroke="#5A6A8A" stroke-width="0.7"/>
  <rect x="11" y="41" width="12" height="12" fill="#8AAFC4" opacity="0.5"/>
  <rect x="25" y="41" width="12" height="12" fill="#8AC4A0" opacity="0.5"/>
  <rect x="39" y="41" width="12" height="12" fill="#C4A08A" opacity="0.5"/>
  <rect x="11" y="55" width="12" height="12" fill="#C4C08A" opacity="0.5"/>
  <rect x="25" y="55" width="12" height="12" fill="#A08AC4" opacity="0.5"/>
  <rect x="39" y="55" width="12" height="12" fill="#8AC4C4" opacity="0.5"/>
  <rect x="11" y="69" width="12" height="12" fill="#C48AA0" opacity="0.5"/>
  <rect x="25" y="69" width="12" height="12" fill="#8AC48A" opacity="0.5"/>
  <rect x="39" y="69" width="12" height="12" fill="#C4A0C4" opacity="0.5"/>
  <text class="label" x="31" y="100">Input</text>

  <line class="line" x1="52" y1="61" x2="68" y2="61"/>

  <rect class="box patch" x="68" y="35" width="40" height="52" rx="3"/>
  <text class="txt" x="88" y="50" font-size="7">Patchify</text>
  <text class="txt" x="88" y="62" font-size="7">16×16</text>
  <text class="dim" x="88" y="77">9 patches</text>
  <text class="label" x="88" y="100">Split</text>

  <g transform="translate(65,108)">
    <rect x="0" y="0" width="10" height="10" fill="#8AAFC4" opacity="0.7" rx="1"/>
    <rect x="13" y="0" width="10" height="10" fill="#8AC4A0" opacity="0.7" rx="1"/>
    <rect x="26" y="0" width="10" height="10" fill="#C4A08A" opacity="0.7" rx="1"/>
    <rect x="0" y="13" width="10" height="10" fill="#C4C08A" opacity="0.7" rx="1"/>
    <rect x="13" y="13" width="10" height="10" fill="#A08AC4" opacity="0.7" rx="1"/>
    <rect x="26" y="13" width="10" height="10" fill="#8AC4C4" opacity="0.7" rx="1"/>
    <rect x="0" y="26" width="10" height="10" fill="#C48AA0" opacity="0.7" rx="1"/>
    <rect x="13" y="26" width="10" height="10" fill="#8AC48A" opacity="0.7" rx="1"/>
    <rect x="26" y="26" width="10" height="10" fill="#C4A0C4" opacity="0.7" rx="1"/>
  </g>

  <line class="line" x1="108" y1="61" x2="124" y2="61"/>

  <rect class="box embed" x="124" y="38" width="44" height="48"/>
  <text class="txt" x="146" y="52" font-size="7">Linear</text>
  <text class="txt" x="146" y="64" font-size="7">Projection</text>
  <text class="dim" x="146" y="80">D=768</text>
  <text class="label" x="146" y="100">Embed</text>

  <g transform="translate(122,110)">
    <rect x="0" y="0" width="6" height="8" fill="#4F7A5C" rx="1"/><text fill="#fff" font-size="5" x="3" y="5" text-anchor="middle" dominant-baseline="central">P₁</text>
    <rect x="8" y="0" width="6" height="8" fill="#4F7A5C" rx="1"/><text fill="#fff" font-size="5" x="11" y="5" text-anchor="middle" dominant-baseline="central">P₂</text>
    <rect x="16" y="0" width="6" height="8" fill="#4F7A5C" rx="1"/><text fill="#fff" font-size="5" x="19" y="5" text-anchor="middle" dominant-baseline="central">P₃</text>
    <rect x="24" y="0" width="6" height="8" fill="#4F7A5C" rx="1"/><text fill="#fff" font-size="5" x="27" y="5" text-anchor="middle" dominant-baseline="central">P₄</text>
    <rect x="32" y="0" width="6" height="8" fill="#4F7A5C" rx="1"/><text fill="#fff" font-size="5" x="35" y="5" text-anchor="middle" dominant-baseline="central">P₅</text>
    <rect x="40" y="0" width="6" height="8" fill="#4F7A5C" rx="1"/><text fill="#fff" font-size="5" x="43" y="5" text-anchor="middle" dominant-baseline="central">P₆</text>
    <rect x="48" y="0" width="6" height="8" fill="#4F7A5C" rx="1"/><text fill="#fff" font-size="5" x="51" y="5" text-anchor="middle" dominant-baseline="central">P₇</text>
    <rect x="56" y="0" width="6" height="8" fill="#4F7A5C" rx="1"/><text fill="#fff" font-size="5" x="59" y="5" text-anchor="middle" dominant-baseline="central">P₈</text>
    <rect x="64" y="0" width="6" height="8" fill="#4F7A5C" rx="1"/><text fill="#fff" font-size="5" x="67" y="5" text-anchor="middle" dominant-baseline="central">P₉</text>
  </g>

  <line class="line" x1="168" y1="61" x2="184" y2="61"/>

  <rect class="box pos" x="184" y="38" width="44" height="48"/>
  <text class="txt" x="206" y="50" font-size="7">+ Positional</text>
  <text class="txt" x="206" y="62" font-size="7">Embedding</text>
  <text class="dim" x="206" y="80">Learnable</text>
  <text class="label" x="206" y="100">+ Pos</text>

  <line class="line" x1="228" y1="61" x2="244" y2="61"/>

  <rect class="box transformer" x="244" y="32" width="60" height="58" rx="5"/>
  <rect x="248" y="38" width="52" height="18" fill="#E8D4E8" stroke="#8A5A8A" stroke-width="1" rx="2"/>
  <text class="txt" x="274" y="47" font-size="7">MSA + LN</text>
  <rect class="box" x="248" y="62" width="52" height="18" fill="#E8D4E8" stroke="#8A5A8A" stroke-width="1" rx="2"/>
  <text class="txt" x="274" y="71" font-size="7">FFN + LN</text>
  <text class="label" x="274" y="100">Transformer Encoder (×12)</text>

  <line class="line" x1="304" y1="61" x2="320" y2="61"/>

  <rect class="box mlp" x="320" y="42" width="40" height="38"/>
  <text class="txt" x="340" y="55" font-size="8">MLP</text>
  <text class="txt" x="340" y="67" font-size="8">Head</text>
  <text class="label" x="340" y="92">Classify</text>

  <line class="line" x1="360" y1="61" x2="376" y2="61"/>

  <rect class="box mlp" x="376" y="46" width="36" height="30"/>
  <text class="txt" x="394" y="56" font-size="8">CLSToken</text>
  <text class="dim" x="394" y="69">→ class</text>

  <text class="sub" x="394" y="92">CLS → class</text>

  <text class="label" x="200" y="155">Token Sequence to Transformer</text>
  <g transform="translate(80,162)">
    <rect x="0" y="0" width="16" height="16" fill="#8A5A8A" rx="2"/>
    <text fill="#fff" font-size="7" font-weight="700" x="8" y="9" text-anchor="middle" dominant-baseline="central">CLS</text>
    <rect x="20" y="0" width="16" height="16" fill="#5A6A8A" rx="2"/>
    <text fill="#fff" font-size="7" x="28" y="9" text-anchor="middle" dominant-baseline="central">P₁</text>
    <rect x="40" y="0" width="16" height="16" fill="#5A6A8A" rx="2"/>
    <text fill="#fff" font-size="7" x="48" y="9" text-anchor="middle" dominant-baseline="central">P₂</text>
    <rect x="60" y="0" width="16" height="16" fill="#5A6A8A" rx="2"/>
    <text fill="#fff" font-size="7" x="68" y="9" text-anchor="middle" dominant-baseline="central">P₃</text>
    <text fill="#7A756A" font-size="10" x="82" y="9" dominant-baseline="central">⋯</text>
    <rect x="88" y="0" width="16" height="16" fill="#5A6A8A" rx="2"/>
    <text fill="#fff" font-size="7" x="96" y="9" text-anchor="middle" dominant-baseline="central">P₉</text>
  </g>

  <g transform="translate(80,185)">
    <text class="sub" x="0" y="0" text-anchor="start">+ Pos₁ … Pos₉</text>
  </g>

  <text class="sub" x="210" y="210">Each patch (16×16×3) → D-dim vector. Prepend [CLS] token for classification.</text>
</svg>
