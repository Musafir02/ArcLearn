<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 200" font-family="Inter, sans-serif">
  <defs>
    <style>
      .title { fill: #2B2A26; font-size: 14px; font-weight: 700; text-anchor: middle; }
      .label { fill: #7A756A; font-size: 10px; text-anchor: middle; }
      .sub { fill: #555047; font-size: 9px; font-weight: 600; text-anchor: middle; }
      .box { rx: 4; stroke-width: 2; }
      .cell { fill: #D4E8D4; stroke: #4F7A5C; }
      .merge { fill: #F1E0D6; stroke: #C96A45; }
      .result { fill: #E8D4E8; stroke: #8A5A8A; }
      .txt { fill: #2B2A26; font-size: 10px; font-weight: 600; text-anchor: middle; dominant-baseline: central; }
      .txt-sm { fill: #2B2A26; font-size: 9px; text-anchor: middle; dominant-baseline: central; }
      .line { stroke: #7A756A; stroke-width: 1.5; fill: none; marker-end: url(#b1); }
    </style>
    <marker id="b1" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon fill="#7A756A" points="0,0 7,2.5 0,5"/>
    </marker>
  </defs>

  <text class="title" x="220" y="18">BPE Tokenization</text>

  <text class="label" x="59" y="42">Step 1: Characters</text>
  <g transform="translate(10,50)">
    <rect class="box cell" x="0" y="0" width="18" height="18"/><text class="txt-sm" x="9" y="9">l</text>
    <rect class="box cell" x="20" y="0" width="18" height="18"/><text class="txt-sm" x="29" y="9">o</text>
    <rect class="box cell" x="40" y="0" width="18" height="18"/><text class="txt-sm" x="49" y="9">w</text>
    <rect class="box cell" x="60" y="0" width="18" height="18"/><text class="txt-sm" x="69" y="9">e</text>
    <rect class="box cell" x="80" y="0" width="18" height="18"/><text class="txt-sm" x="89" y="9">r</text>
  </g>

  <line class="line" x1="115" y1="59" x2="182" y2="59"/>

  <text class="label" x="239" y="42">Step 2: Find Frequent Pairs</text>
  <g transform="translate(190,50)">
    <rect class="box cell" x="0" y="0" width="18" height="18"/><text class="txt-sm" x="9" y="9">l</text>
    <rect class="box cell" x="20" y="0" width="18" height="18"/><text class="txt-sm" x="29" y="9">o</text>
    <rect class="box merge" x="40" y="0" width="18" height="18"/><text class="txt-sm" x="49" y="9">w</text>
    <rect class="box merge" x="60" y="0" width="18" height="18"/><text class="txt-sm" x="69" y="9">e</text>
    <rect class="box cell" x="80" y="0" width="18" height="18"/><text class="txt-sm" x="89" y="9">r</text>
  </g>
  <text class="sub" x="300" y="59" style="text-anchor: start;">"we" = most frequent pair</text>

  <line class="line" x1="239" y1="68" x2="239" y2="108"/>

  <text class="label" x="239" y="100">Step 3: Merge Pair → New Token</text>
  <g transform="translate(190,108)">
    <rect class="box cell" x="0" y="0" width="18" height="18"/><text class="txt-sm" x="9" y="9">l</text>
    <rect class="box cell" x="20" y="0" width="18" height="18"/><text class="txt-sm" x="29" y="9">o</text>
    <rect class="box result" x="40" y="0" width="30" height="18"/><text class="txt-sm" x="55" y="9">we</text>
    <rect class="box cell" x="72" y="0" width="18" height="18"/><text class="txt-sm" x="81" y="9">r</text>
  </g>
  <text class="sub" x="300" y="117" style="text-anchor: start;">"we" is now one token!</text>

  <line class="line" x1="239" y1="126" x2="239" y2="163"/>

  <text class="label" x="239" y="155">Step 4: Repeat Until Done</text>
  <g transform="translate(190,163)">
    <rect class="box result" x="0" y="0" width="30" height="18"/><text class="txt-sm" x="15" y="9">low</text>
    <rect class="box result" x="32" y="0" width="24" height="18"/><text class="txt-sm" x="44" y="9">er</text>
  </g>

  <line class="line" x1="190" y1="172" x2="147" y2="172"/>

  <g transform="translate(15,140)">
    <rect x="0" y="0" width="120" height="55" fill="#F8F7F4" stroke="#C9C4B8" stroke-width="1" rx="6"/>
    <text class="sub" x="60" y="14" fill="#2B2A26" font-weight="700">Learned Vocabulary</text>
    <text class="txt-sm" x="60" y="30">[l, o, w, e, r, we, low, er]</text>
    <text class="txt-sm" x="60" y="44">→ tokens: [low, er]</text>
  </g>
</svg>
