<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 270" font-family="Inter, sans-serif">
  <rect width="450" height="270" fill="#F8F7F4" rx="8"/>
  <text x="225" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#333">Database Sharding</text>

  <defs>
    <marker id="sb" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#5A6A8A"/></marker>
    <marker id="so" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#C96A45"/></marker>
    <marker id="sg" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#4F7A5C"/></marker>
    <marker id="sp" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#8A5A8A"/></marker>
  </defs>

  <!-- Data source -->
  <rect x="30" y="70" width="75" height="50" fill="#D6DCE8" stroke="#5A6A8A" rx="8" stroke-width="2"/>
  <text x="67" y="92" text-anchor="middle" font-size="11" fill="#5A6A8A" font-weight="700">Data</text>
  <text x="67" y="107" text-anchor="middle" font-size="9" fill="#5A6A8A">user_id: 1,2,3...</text>

  <!-- Arrow to shard router -->
  <line x1="105" y1="95" x2="140" y2="95" stroke="#5A6A8A" stroke-width="1.5" marker-end="url(#sb)"/>

  <!-- Shard Router -->
  <rect x="150" y="65" width="100" height="60" fill="#D4E8D4" stroke="#4F7A5C" rx="8" stroke-width="2"/>
  <text x="200" y="88" text-anchor="middle" font-size="11" fill="#4F7A5C" font-weight="700">Shard Router</text>
  <text x="200" y="105" text-anchor="middle" font-size="9" fill="#4F7A5C">hash(key) % N</text>

  <!-- Arrows to shards -->
  <line x1="250" y1="80" x2="310" y2="60" stroke="#C96A45" stroke-width="1.5" marker-end="url(#so)"/>
  <line x1="250" y1="95" x2="310" y2="95" stroke="#C96A45" stroke-width="1.5" marker-end="url(#so)"/>
  <line x1="250" y1="110" x2="310" y2="130" stroke="#C96A45" stroke-width="1.5" marker-end="url(#so)"/>

  <!-- Shards -->
  <rect x="320" y="40" width="100" height="38" fill="#F1E0D6" stroke="#C96A45" rx="6"/>
  <text x="370" y="57" text-anchor="middle" font-size="10" fill="#C96A45" font-weight="700">Shard 1</text>
  <text x="370" y="70" text-anchor="middle" font-size="8" fill="#888">keys: 0,3,6,9...</text>

  <rect x="320" y="85" width="100" height="38" fill="#F1E0D6" stroke="#C96A45" rx="6"/>
  <text x="370" y="102" text-anchor="middle" font-size="10" fill="#C96A45" font-weight="700">Shard 2</text>
  <text x="370" y="115" text-anchor="middle" font-size="8" fill="#888">keys: 1,4,7...</text>

  <rect x="320" y="130" width="100" height="38" fill="#F1E0D6" stroke="#C96A45" rx="6"/>
  <text x="370" y="147" text-anchor="middle" font-size="10" fill="#C96A45" font-weight="700">Shard 3</text>
  <text x="370" y="160" text-anchor="middle" font-size="8" fill="#888">keys: 2,5,8...</text>

  <!-- Consistent Hashing Ring -->
  <rect x="60" y="155" width="200" height="100" fill="white" stroke="#ddd" rx="8"/>
  <text x="160" y="173" text-anchor="middle" font-size="11" fill="#333" font-weight="700">Consistent Hashing Ring</text>

  <!-- Ring circle -->
  <circle cx="160" cy="215" r="30" fill="none" stroke="#bbb" stroke-width="1.5"/>

  <!-- Shard markers on ring -->
  <circle cx="160" cy="185" r="5" fill="#4F7A5C"/>
  <text x="172" y="189" font-size="8" fill="#4F7A5C" font-weight="600">S1</text>

  <circle cx="186" cy="228" r="5" fill="#C96A45"/>
  <text x="196" y="232" font-size="8" fill="#C96A45" font-weight="600">S2</text>

  <circle cx="134" cy="228" r="5" fill="#8A5A8A"/>
  <text x="120" y="232" font-size="8" fill="#8A5A8A" font-weight="600">S3</text>

  <!-- Virtual nodes indicator -->
  <circle cx="160" cy="215" r="2" fill="#999"/>
  <text x="168" y="218" font-size="7" fill="#999">center</text>

  <!-- Note -->
  <text x="60" y="263" font-size="8" fill="#888" font-style="italic">Virtual nodes improve distribution evenness</text>
</svg>
