<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 280" font-family="Inter, sans-serif">
  <rect width="450" height="280" fill="#F8F7F4" rx="8"/>
  <text x="225" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#333">Big-O Time Complexity</text>

  <!-- Axes -->
  <line x1="70" y1="240" x2="420" y2="240" stroke="#ccc" stroke-width="1.5"/>
  <line x1="70" y1="240" x2="70" y2="45" stroke="#ccc" stroke-width="1.5"/>
  <text x="245" y="268" text-anchor="middle" font-size="12" fill="#666">Input Size (n)</text>
  <text x="22" y="145" text-anchor="middle" font-size="12" fill="#666" transform="rotate(-90,22,145)">Time</text>

  <!-- Grid lines -->
  <line x1="70" y1="185" x2="420" y2="185" stroke="#eee" stroke-width="0.8"/>
  <line x1="70" y1="130" x2="420" y2="130" stroke="#eee" stroke-width="0.8"/>
  <line x1="70" y1="75" x2="420" y2="75" stroke="#eee" stroke-width="0.8"/>

  <!-- O(1) - Green flat line -->
  <line x1="70" y1="230" x2="400" y2="230" stroke="#4F7A5C" stroke-width="2.5" stroke-linecap="round"/>
  <text x="405" y="234" font-size="11" fill="#4F7A5C" font-weight="600">O(1)</text>

  <!-- O(log n) - Light green curve -->
  <path d="M70,225 Q150,195 250,175 Q340,162 400,155" fill="none" stroke="#7CB68A" stroke-width="2.5" stroke-linecap="round"/>
  <text x="405" y="159" font-size="11" fill="#7CB68A" font-weight="600">O(log n)</text>

  <!-- O(n) - Orange diagonal line -->
  <line x1="70" y1="235" x2="400" y2="65" stroke="#C96A45" stroke-width="2.5" stroke-linecap="round"/>
  <text x="405" y="69" font-size="11" fill="#C96A45" font-weight="600">O(n)</text>

  <!-- O(n log n) - Blue curve -->
  <path d="M70,235 Q150,195 250,125 Q340,75 400,50" fill="none" stroke="#5A6A8A" stroke-width="2.5" stroke-linecap="round"/>
  <text x="405" y="54" font-size="11" fill="#5A6A8A" font-weight="600">O(n log n)</text>

  <!-- O(n²) - Purple steep curve -->
  <path d="M70,235 Q180,220 280,140 Q350,80 400,48" fill="none" stroke="#8A5A8A" stroke-width="2.5" stroke-linecap="round"/>
  <text x="405" y="44" font-size="11" fill="#8A5A8A" font-weight="600">O(n²)</text>

  <!-- Legend box -->
  <rect x="85" y="50" width="130" height="95" fill="white" stroke="#ddd" rx="6" opacity="0.95"/>
  <circle cx="98" cy="67" r="4" fill="#4F7A5C"/><text x="108" y="71" font-size="10" fill="#444">Constant</text>
  <circle cx="98" cy="85" r="4" fill="#7CB68A"/><text x="108" y="89" font-size="10" fill="#444">Logarithmic</text>
  <circle cx="98" cy="103" r="4" fill="#C96A45"/><text x="108" y="107" font-size="10" fill="#444">Linear</text>
  <circle cx="98" cy="121" r="4" fill="#5A6A8A"/><text x="108" y="125" font-size="10" fill="#444">Linearithmic</text>
  <circle cx="98" cy="139" r="4" fill="#8A5A8A"/><text x="108" y="143" font-size="10" fill="#444">Quadratic</text>
</svg>
