<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 250">
  <defs>
    <marker id="marr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="none" stroke="#7A756A" stroke-width="1"/>
    </marker>
  </defs>
  <style>text { font-family: Inter, sans-serif; }</style>
  <rect width="440" height="250" fill="#F8F7F4" rx="8"/>

  <text x="220" y="22" text-anchor="middle" font-size="13" font-weight="600" fill="#2B2A26">Multimodal Model Architecture</text>

  <text x="40" y="52" text-anchor="middle" font-size="9" font-weight="600" fill="#5A6A8A">Inputs</text>

  <rect x="10" y="60" width="65" height="30" rx="5" fill="#D6DCE8" stroke="#5A6A8A" stroke-width="1.5"/>
  <text x="42" y="79" text-anchor="middle" font-size="9" fill="#5A6A8A">Text</text>

  <rect x="10" y="96" width="65" height="30" rx="5" fill="#E8D4E8" stroke="#8A5A8A" stroke-width="1.5"/>
  <text x="42" y="115" text-anchor="middle" font-size="9" fill="#8A5A8A">Image</text>

  <rect x="10" y="132" width="65" height="30" rx="5" fill="#F1E0D6" stroke="#C96A45" stroke-width="1.5"/>
  <text x="42" y="151" text-anchor="middle" font-size="9" fill="#C96A45">Audio</text>

  <line x1="78" y1="75" x2="100" y2="75" stroke="#7A756A" stroke-width="1.2" marker-end="url(#marr)"/>
  <line x1="78" y1="111" x2="100" y2="111" stroke="#7A756A" stroke-width="1.2" marker-end="url(#marr)"/>
  <line x1="78" y1="147" x2="100" y2="147" stroke="#7A756A" stroke-width="1.2" marker-end="url(#marr)"/>

  <rect x="104" y="55" width="85" height="100" rx="6" fill="#E8E4D4" stroke="#8A7A5A" stroke-width="1.5"/>
  <text x="146" y="75" text-anchor="middle" font-size="9" font-weight="600" fill="#8A7A5A">Tokenizer /</text>
  <text x="146" y="88" text-anchor="middle" font-size="9" font-weight="600" fill="#8A7A5A">Encoder</text>
  <text x="146" y="110" text-anchor="middle" font-size="7" fill="#7A756A">Text → tokens</text>
  <text x="146" y="122" text-anchor="middle" font-size="7" fill="#7A756A">Image → patches</text>
  <text x="146" y="134" text-anchor="middle" font-size="7" fill="#7A756A">Audio → tokens</text>

  <line x1="192" y1="105" x2="215" y2="105" stroke="#7A756A" stroke-width="1.5" marker-end="url(#marr)"/>

  <rect x="219" y="50" width="105" height="110" rx="8" fill="#D4E8D4" stroke="#4F7A5C" stroke-width="2"/>
  <text x="271" y="75" text-anchor="middle" font-size="11" font-weight="700" fill="#4F7A5C">Shared</text>
  <text x="271" y="92" text-anchor="middle" font-size="11" font-weight="700" fill="#4F7A5C">Transformer</text>
  <text x="271" y="112" text-anchor="middle" font-size="7" fill="#7A756A">Cross-attention</text>
  <text x="271" y="124" text-anchor="middle" font-size="7" fill="#7A756A">Self-attention</text>
  <text x="271" y="136" text-anchor="middle" font-size="7" fill="#7A756A">Fused representations</text>

  <line x1="327" y1="75" x2="350" y2="75" stroke="#7A756A" stroke-width="1.2" marker-end="url(#marr)"/>
  <line x1="327" y1="105" x2="350" y2="105" stroke="#7A756A" stroke-width="1.2" marker-end="url(#marr)"/>
  <line x1="327" y1="135" x2="350" y2="135" stroke="#7A756A" stroke-width="1.2" marker-end="url(#marr)"/>

  <text x="400" y="52" text-anchor="middle" font-size="9" font-weight="600" fill="#4F7A5C">Outputs</text>

  <rect x="354" y="60" width="70" height="30" rx="5" fill="#D6DCE8" stroke="#5A6A8A" stroke-width="1.5"/>
  <text x="389" y="79" text-anchor="middle" font-size="9" fill="#5A6A8A">Text</text>

  <rect x="354" y="96" width="70" height="30" rx="5" fill="#E8D4E8" stroke="#8A5A8A" stroke-width="1.5"/>
  <text x="389" y="115" text-anchor="middle" font-size="9" fill="#8A5A8A">Image</text>

  <rect x="354" y="132" width="70" height="30" rx="5" fill="#F1E0D6" stroke="#C96A45" stroke-width="1.5"/>
  <text x="389" y="151" text-anchor="middle" font-size="9" fill="#C96A45">Audio</text>

  <path d="M42,170 Q42,185 55,185 L385,185 Q400,185 400,170" fill="none" stroke="#4F7A5C" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="220" y="200" text-anchor="middle" font-size="7" fill="#4F7A5C">any-to-any modality</text>

  <text x="220" y="218" text-anchor="middle" font-size="8" font-weight="600" fill="#7A756A">Examples: GPT-4o, Gemini, Claude 3, Flamingo</text>
</svg>