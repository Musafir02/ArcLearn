<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 240">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#7A756A" stroke-width="1.2"/>
    </marker>
  </defs>
  <style>text { font-family: Inter, sans-serif; }</style>
  <rect width="440" height="240" fill="#F8F7F4" rx="8"/>

