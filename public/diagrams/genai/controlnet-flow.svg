<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 260">
  <defs>
    <marker id="carr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#7A756A" stroke-width="1.2"/>
    </marker>
  </defs>
  <style>text { font-family: Inter, sans-serif; }</style>
  <rect width="440" height="260" fill="#F8F7F4" rx="8"/>

  <text x="220" y="22" text-anchor="middle" font-size="13" font-weight="600" fill="#2B2A26">ControlNet Architecture</text>

  <rect x="30" y="45" width="80" height="36" rx="6" fill="#D6DCE8" stroke="#5A6A8A" stroke-width="1.5"/>
  <text x="70" y="60" text-anchor="middle" font-size="9" font-weight="600" fill="#5A6A8A">Text</text>
  <text x="70" y="73" text-anchor="middle" font-size="9" font-weight="600" fill="#5A6A8A">Prompt</text>

  <line x1="112" y1="63" x2="138" y2="63" stroke="#7A756A" stroke-width="1.5" marker-end="url(#carr)"/>

  <rect x="140" y="40" width="110" height="50" rx="6" fill="#E8D4E8" stroke="#8A5A8A" stroke-width="1.5"/>
  <text x="195" y="60" text-anchor="middle" font-size="10" font-weight="600" fill="#8A5A8A">Diffusion</text>
  <text x="195" y="75" text-anchor="middle" font-size="10" font-weight="600" fill="#8A5A8A">Model</text>

  <line x1="255" y1="65" x2="310" y2="65" stroke="#7A756A" stroke-width="1.5" marker-end="url(#carr)"/>

  <rect x="314" y="42" width="80" height="46" rx="6" fill="#D4E8D4" stroke="#4F7A5C" stroke-width="2"/>
  <text x="354" y="60" text-anchor="middle" font-size="9" font-weight="600" fill="#4F7A5C">Generated</text>
  <text x="354" y="75" text-anchor="middle" font-size="9" font-weight="600" fill="#4F7A5C">Image</text>

  <rect x="15" y="140" width="110" height="80" rx="6" fill="#F1E0D6" stroke="#C96A45" stroke-width="1.5"/>
  <text x="70" y="157" text-anchor="middle" font-size="9" font-weight="600" fill="#C96A45">Conditioning</text>
  <text x="70" y="170" text-anchor="middle" font-size="9" font-weight="600" fill="#C96A45">Input</text>
  <text x="35" y="190" font-size="7" fill="#7A756A">• Edge map</text>
  <text x="35" y="200" font-size="7" fill="#7A756A">• Depth map</text>
  <text x="35" y="210" font-size="7" fill="#7A756A">• Pose skeleton</text>

  <line x1="130" y1="180" x2="155" y2="180" stroke="#7A756A" stroke-width="1.5" marker-end="url(#carr)"/>

  <rect x="159" y="140" width="100" height="80" rx="6" fill="#E8E4D4" stroke="#8A7A5A" stroke-width="2"/>
  <text x="209" y="168" text-anchor="middle" font-size="11" font-weight="700" fill="#8A7A5A">ControlNet</text>
  <text x="209" y="183" text-anchor="middle" font-size="7" fill="#7A756A">Zero convolution</text>
  <text x="209" y="195" text-anchor="middle" font-size="7" fill="#7A756A">copy of encoder</text>
  <text x="209" y="207" text-anchor="middle" font-size="7" fill="#7A756A">trainable weights</text>

  <circle cx="209" cy="118" r="10" fill="white" stroke="#C96A45" stroke-width="1.5"/>
  <text x="209" y="122" text-anchor="middle" font-size="12" font-weight="700" fill="#C96A45">+</text>

  <line x1="209" y1="138" x2="209" y2="130" stroke="#C96A45" stroke-width="1.5" marker-end="url(#carr)"/>
  <line x1="195" y1="90" x2="209" y2="108" stroke="#C96A45" stroke-width="1.5" marker-end="url(#carr)"/>

  <text x="220" y="246" text-anchor="middle" font-size="8" fill="#7A756A">ControlNet injects spatial control into the diffusion process</text>
