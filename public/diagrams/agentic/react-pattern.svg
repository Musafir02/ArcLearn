<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 270" font-family="Inter, sans-serif">
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7A756A"/>
    </marker>
  </defs>

  <rect width="440" height="270" rx="8" fill="#FAFAF8" stroke="#E8E6E0" stroke-width="1"/>

  <text x="220" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#2B2A26">ReAct Pattern</text>
  <text x="220" y="44" text-anchor="middle" font-size="10" fill="#7A756A">Thought + Action → Observation cycle</text>

  <rect x="50" y="58" width="160" height="38" rx="6" fill="#D6DCE8" stroke="#5A6A8A" stroke-width="1.2"/>
  <text x="130" y="74" text-anchor="middle" font-size="10" font-weight="600" fill="#5A6A8A">Thought 1</text>
  <text x="130" y="87" text-anchor="middle" font-size="8" fill="#7A756A">Reason about the problem</text>

  <line x1="130" y1="96" x2="130" y2="106" stroke="#7A756A" stroke-width="1.2" marker-end="url(#arrow2)"/>

  <rect x="50" y="106" width="160" height="38" rx="6" fill="#D4E8D4" stroke="#4F7A5C" stroke-width="1.2"/>
  <text x="130" y="122" text-anchor="middle" font-size="10" font-weight="600" fill="#4F7A5C">Action 1</text>
  <text x="130" y="135" text-anchor="middle" font-size="8" fill="#7A756A">Call a tool</text>

  <line x1="130" y1="144" x2="130" y2="154" stroke="#7A756A" stroke-width="1.2" marker-end="url(#arrow2)"/>

  <rect x="50" y="154" width="160" height="38" rx="6" fill="#F1E0D6" stroke="#C96A45" stroke-width="1.2"/>
  <text x="130" y="170" text-anchor="middle" font-size="10" font-weight="600" fill="#C96A45">Observation 1</text>
  <text x="130" y="183" text-anchor="middle" font-size="8" fill="#7A756A">Tool returns result</text>

  <path d="M 50 173 Q 28 173 28 88 Q 28 68 50 68" fill="none" stroke="#7A756A" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow2)"/>
  <text x="22" y="135" text-anchor="middle" font-size="8" fill="#7A756A" transform="rotate(-90 22 135)">repeat</text>

  <text x="320" y="55" text-anchor="middle" font-size="10" font-weight="600" fill="#7A756A">Iteration 2...</text>

  <rect x="240" y="62" width="160" height="38" rx="6" fill="#D6DCE8" stroke="#5A6A8A" stroke-width="1.2" opacity="0.85"/>
  <text x="320" y="78" text-anchor="middle" font-size="10" font-weight="600" fill="#5A6A8A">Thought 2</text>
  <text x="320" y="91" text-anchor="middle" font-size="8" fill="#7A756A">Reflect on observation</text>

  <line x1="320" y1="100" x2="320" y2="110" stroke="#7A756A" stroke-width="1.2" marker-end="url(#arrow2)"/>

  <rect x="240" y="110" width="160" height="38" rx="6" fill="#D4E8D4" stroke="#4F7A5C" stroke-width="1.2" opacity="0.85"/>
  <text x="320" y="126" text-anchor="middle" font-size="10" font-weight="600" fill="#4F7A5C">Action 2</text>
  <text x="320" y="139" text-anchor="middle" font-size="8" fill="#7A756A">Call another tool</text>

  <line x1="320" y1="148" x2="320" y2="158" stroke="#7A756A" stroke-width="1.2" marker-end="url(#arrow2)"/>

  <rect x="240" y="158" width="160" height="38" rx="6" fill="#F1E0D6" stroke="#C96A45" stroke-width="1.2" opacity="0.85"/>
  <text x="320" y="174" text-anchor="middle" font-size="10" font-weight="600" fill="#C96A45">Observation 2</text>
  <text x="320" y="187" text-anchor="middle" font-size="8" fill="#7A756A">Tool returns result</text>

  <path d="M 210 173 Q 230 173 230 91 Q 230 72 240 72" fill="none" stroke="#7A756A" stroke-width="1.2" marker-end="url(#arrow2)" stroke-dasharray="4,3"/>

  <line x1="320" y1="196" x2="320" y2="212" stroke="#8A7A5A" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <rect x="260" y="212" width="120" height="34" rx="6" fill="#E8E4D4" stroke="#8A7A5A" stroke-width="1.5"/>
  <text x="320" y="233" text-anchor="middle" font-size="11" font-weight="600" fill="#8A7A5A">Final Answer</text>
</svg>
