  <rect x="90" y="195" width="130" height="40" rx="6" fill="#F5F5F0" stroke="#D4D2CC" stroke-width="1.2"/>
  <text x="155" y="212" text-anchor="middle" font-size="10" font-weight="600" fill="#2B2A26">Agent + Docs</text>
  <text x="155" y="225" text-anchor="middle" font-size="8" fill="#7A756A">Augmented context</text>

  <line x1="155" y1="235" x2="175" y2="255" stroke="#7A756A" stroke-width="1.2" marker-end="url(#arrow4)"/>

  <rect x="115" y="255" width="160" height="30" rx="6" fill="#E8E4D4" stroke="#8A7A5A" stroke-width="1.2"/>
  <text x="195" y="274" text-anchor="middle" font-size="10" font-weight="600" fill="#8A7A5A">LLM → Response</text>
