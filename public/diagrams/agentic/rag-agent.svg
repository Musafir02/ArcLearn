  <rect width="440" height="295" rx="8" fill="#FAFAF8" stroke="#E8E6E0" stroke-width="1"/>

  <text x="220" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#2B2A26">RAG-Powered Agent</text>

  <rect x="20" y="55" width="100" height="36" rx="6" fill="#F1E0D6" stroke="#C96A45" stroke-width="1.2"/>
  <text x="70" y="72" text-anchor="middle" font-size="10" font-weight="600" fill="#C96A45">User Query</text>
  <text x="70" y="84" text-anchor="middle" font-size="8" fill="#7A756A">"How do I...?"</text>

  <rect x="155" y="48" width="100" height="50" rx="8" fill="#D6DCE8" stroke="#5A6A8A" stroke-width="1.5"/>
  <text x="205" y="69" text-anchor="middle" font-size="11" font-weight="600" fill="#5A6A8A">Agent</text>
  <text x="205" y="84" text-anchor="middle" font-size="8" fill="#7A756A">Reason + Decide</text>

  <line x1="120" y1="73" x2="153" y2="73" stroke="#7A756A" stroke-width="1.2" marker-end="url(#arrow4)"/>

  <line x1="205" y1="98" x2="205" y2="108" stroke="#7A756A" stroke-width="1.2" marker-end="url(#arrow4)"/>

  <polygon points="205,110 230,133 205,156 180,133" fill="#E8E4D4" stroke="#8A7A5A" stroke-width="1.2"/>
  <text x="205" y="130" text-anchor="middle" font-size="8" font-weight="600" fill="#8A7A5A">Retrieve?</text>
  <text x="205" y="142" text-anchor="middle" font-size="7" fill="#7A756A">needs docs</text>

  <line x1="230" y1="133" x2="280" y2="133" stroke="#4F7A5C" stroke-width="1.2" marker-end="url(#arrow4g)"/>
  <text x="252" y="126" font-size="8" font-weight="600" fill="#4F7A5C">Yes</text>

  <rect x="282" y="115" width="80" height="38" rx="6" fill="#D4E8D4" stroke="#4F7A5C" stroke-width="1.2"/>
  <text x="322" y="132" text-anchor="middle" font-size="10" font-weight="600" fill="#4F7A5C">Vector DB</text>
  <text x="322" y="145" text-anchor="middle" font-size="8" fill="#7A756A">Semantic search</text>

  <line x1="322" y1="153" x2="322" y2="170" stroke="#8A5A8A" stroke-width="1.2" marker-end="url(#arrow4p)"/>

  <rect x="282" y="172" width="80" height="34" rx="6" fill="#E8D4E8" stroke="#8A5A8A" stroke-width="1.2"/>
  <text x="322" y="188" text-anchor="middle" font-size="10" font-weight="600" fill="#8A5A8A">Retrieved Docs</text>
  <text x="322" y="200" text-anchor="middle" font-size="8" fill="#7A756A">Top-k chunks</text>

  <path d="M 282 189 Q 250 189 250 140 Q 250 90 205 90" fill="none" stroke="#8A5A8A" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow4p)"/>

  <path d="M 205 156 L 205 210 L 148 210" fill="none" stroke="#C96A45" stroke-width="1.2" marker-end="url(#arrow4o)" stroke-dasharray="4,3"/>
