<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" font-family="Inter, sans-serif">
  <defs>
    <style>
      .axis { stroke: #2B2A26; stroke-width: 2; }
      .curve { fill: none; stroke: #C96A45; stroke-width: 3; }
      .boundary { stroke: #7A756A; stroke-width: 1; stroke-dasharray: 5,3; }
      .text { fill: #2B2A26; font-size: 11px; text-anchor: middle; }
      .label { fill: #7A756A; font-size: 10px; }
    </style>
  </defs>
  
  <!-- Axes -->
  <line class="axis" x1="50" y1="200" x2="380" y2="200"/>
  <line class="axis" x1="50" y1="200" x2="50" y2="20"/>
  
  <!-- Labels -->
  <text class="text" x="215" y="230">z</text>
  <text class="label" x="35" y="110" transform="rotate(-90, 35, 110)">σ(z)</text>
  
  <!-- Tick marks -->
  <text class="label" x="50" y="215" style="text-anchor: middle;">-6</text>
  <text class="label" x="110" y="215" style="text-anchor: middle;">-4</text>
  <text class="label" x="170" y="215" style="text-anchor: middle;">-2</text>
  <text class="label" x="230" y="215" style="text-anchor: middle;">0</text>
  <text class="label" x="290" y="215" style="text-anchor: middle;">2</text>
  <text class="label" x="350" y="215" style="text-anchor: middle;">4</text>
  
  <text class="label" x="42" y="204" style="text-anchor: end;">0.0</text>
  <text class="label" x="42" y="159" style="text-anchor: end;">0.5</text>
  <text class="label" x="42" y="29" style="text-anchor: end;">1.0</text>
  
  <!-- Decision boundary -->
  <line class="boundary" x1="50" y1="110" x2="380" y2="110"/>
  <text class="label" x="385" y="113">0.5</text>
  
  <!-- Sigmoid curve -->
  <path class="curve" d="M 50,198 Q 100,195 150,180 Q 200,140 230,110 Q 260,80 310,30 Q 350,22 380,20"/>
  
  <!-- Title -->
  <text class="text" x="215" y="15" font-size="12" font-weight="600">Sigmoid Function: σ(z) = 1/(1+e⁻ᶻ)</text>
</svg>
