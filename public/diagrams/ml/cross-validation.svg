<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 220" font-family="Inter, sans-serif">
  <defs>
    <style>
      .fold-train { fill: #D4E8D4; stroke: #4F7A5C; stroke-width: 1.5; rx: 3; }
      .fold-test { fill: #F1E0D6; stroke: #C96A45; stroke-width: 1.5; rx: 3; }
      .text-title { fill: #2B2A26; font-size: 13px; font-weight: 700; text-anchor: middle; }
      .text-fold { fill: #2B2A26; font-size: 11px; font-weight: 600; text-anchor: end; }
      .text-white { fill: #fff; font-size: 10px; font-weight: 600; text-anchor: middle; }
      .text-bold { fill: #2B2A26; font-size: 10px; font-weight: 600; text-anchor: middle; }
    </style>
  </defs>

  <!-- Title -->
  <text class="text-title" x="250" y="22">5-Fold Cross-Validation</text>

  <!-- Fold 1 -->
  <text class="text-fold" x="75" y="64">Fold 1</text>
  <rect class="fold-test" x="90" y="50" width="70" height="20"/>
  <text class="text-bold" x="125" y="64">TEST</text>
  <rect class="fold-train" x="165" y="50" width="70" height="20"/>
  <text class="text-bold" x="200" y="64">Train</text>
  <rect class="fold-train" x="240" y="50" width="70" height="20"/>
  <text class="text-bold" x="275" y="64">Train</text>
  <rect class="fold-train" x="315" y="50" width="70" height="20"/>
  <text class="text-bold" x="350" y="64">Train</text>
  <rect class="fold-train" x="390" y="50" width="70" height="20"/>
  <text class="text-bold" x="425" y="64">Train</text>

  <!-- Fold 2 -->
  <text class="text-fold" x="75" y="94">Fold 2</text>
  <rect class="fold-train" x="90" y="80" width="70" height="20"/>
  <text class="text-bold" x="125" y="94">Train</text>
  <rect class="fold-test" x="165" y="80" width="70" height="20"/>
  <text class="text-bold" x="200" y="94">TEST</text>
  <rect class="fold-train" x="240" y="80" width="70" height="20"/>
  <text class="text-bold" x="275" y="94">Train</text>
  <rect class="fold-train" x="315" y="80" width="70" height="20"/>
  <text class="text-bold" x="350" y="94">Train</text>
  <rect class="fold-train" x="390" y="80" width="70" height="20"/>
  <text class="text-bold" x="425" y="94">Train</text>

  <!-- Fold 3 -->
  <text class="text-fold" x="75" y="124">Fold 3</text>
  <rect class="fold-train" x="90" y="110" width="70" height="20"/>
  <text class="text-bold" x="125" y="124">Train</text>
  <rect class="fold-train" x="165" y="110" width="70" height="20"/>
  <text class="text-bold" x="200" y="124">Train</text>
  <rect class="fold-test" x="240" y="110" width="70" height="20"/>
  <text class="text-bold" x="275" y="124">TEST</text>
  <rect class="fold-train" x="315" y="110" width="70" height="20"/>
  <text class="text-bold" x="350" y="124">Train</text>
  <rect class="fold-train" x="390" y="110" width="70" height="20"/>
  <text class="text-bold" x="425" y="124">Train</text>

  <!-- Fold 4 -->
  <text class="text-fold" x="75" y="154">Fold 4</text>
  <rect class="fold-train" x="90" y="140" width="70" height="20"/>
  <text class="text-bold" x="125" y="154">Train</text>
  <rect class="fold-train" x="165" y="140" width="70" height="20"/>
  <text class="text-bold" x="200" y="154">Train</text>
  <rect class="fold-train" x="240" y="140" width="70" height="20"/>
  <text class="text-bold" x="275" y="154">Train</text>
  <rect class="fold-test" x="315" y="140" width="70" height="20"/>
  <text class="text-bold" x="350" y="154">TEST</text>
  <rect class="fold-train" x="390" y="140" width="70" height="20"/>
  <text class="text-bold" x="425" y="154">Train</text>

  <!-- Fold 5 -->
  <text class="text-fold" x="75" y="184">Fold 5</text>
  <rect class="fold-train" x="90" y="170" width="70" height="20"/>
  <text class="text-bold" x="125" y="184">Train</text>
  <rect class="fold-train" x="165" y="170" width="70" height="20"/>
  <text class="text-bold" x="200" y="184">Train</text>
  <rect class="fold-train" x="240" y="170" width="70" height="20"/>
  <text class="text-bold" x="275" y="184">Train</text>
  <rect class="fold-train" x="315" y="170" width="70" height="20"/>
  <text class="text-bold" x="350" y="184">Train</text>
  <rect class="fold-test" x="390" y="170" width="70" height="20"/>
  <text class="text-bold" x="425" y="184">TEST</text>

  <!-- Summary text -->
  <text class="text-fold" style="text-anchor: middle;" x="275" y="210">Final Score = Average of all 5 folds</text>
</svg>