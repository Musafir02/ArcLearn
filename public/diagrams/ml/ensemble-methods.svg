<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 310" font-family="Inter, sans-serif">
  <defs>
    <style>
      .box { fill: #F1E0D6; stroke: #C96A45; stroke-width: 2; }
      .box-main { fill: #C96A45; stroke: #8B4513; stroke-width: 2; }
      .text { fill: #2B2A26; font-size: 12px; font-weight: 600; text-anchor: middle; }
      .text-main { fill: #fff; font-size: 14px; font-weight: 700; text-anchor: middle; }
      .text-sub { fill: #7A756A; font-size: 10px; text-anchor: middle; }
      .line { stroke: #C96A45; stroke-width: 2; fill: none; }
    </style>
  </defs>

  <rect class="box-main" x="200" y="10" width="200" height="40" rx="8"/>
  <text class="text-main" x="300" y="35">Ensemble Methods</text>

  <line class="line" x1="300" y1="50" x2="100" y2="100"/>
  <line class="line" x1="300" y1="50" x2="300" y2="100"/>
  <line class="line" x1="300" y1="50" x2="500" y2="100"/>

  <rect class="box" x="30" y="100" width="140" height="40" rx="8"/>
  <text class="text" x="100" y="125">Bagging</text>

  <rect class="box" x="230" y="100" width="140" height="40" rx="8"/>
  <text class="text" x="300" y="125">Boosting</text>

  <rect class="box" x="430" y="100" width="140" height="40" rx="8"/>
  <text class="text" x="500" y="125">Stacking</text>

  <line class="line" x1="100" y1="140" x2="100" y2="170"/>
  <line class="line" x1="300" y1="140" x2="220" y2="170"/>
  <line class="line" x1="300" y1="140" x2="380" y2="170"/>
  <line class="line" x1="500" y1="140" x2="500" y2="170"/>

  <rect class="box" x="45" y="170" width="110" height="40" rx="8"/>
  <text class="text" x="100" y="190">Random Forest</text>
  <text class="text-sub" x="100" y="205">Parallel training</text>

  <rect class="box" x="165" y="170" width="110" height="40" rx="8"/>
  <text class="text" x="220" y="190">XGBoost</text>
  <text class="text-sub" x="220" y="205">Sequential</text>

  <rect class="box" x="325" y="170" width="110" height="40" rx="8"/>
  <text class="text" x="380" y="190">LightGBM</text>
  <text class="text-sub" x="380" y="205">Sequential</text>

  <rect class="box" x="445" y="170" width="110" height="40" rx="8"/>
  <text class="text" x="500" y="190">Meta-learner</text>
  <text class="text-sub" x="500" y="205">Hierarchical</text>

  <line class="line" x1="245" y1="210" x2="300" y2="240"/>
  <line class="line" x1="355" y1="210" x2="300" y2="240"/>

  <rect class="box" x="245" y="240" width="110" height="35" rx="8"/>
  <text class="text" x="300" y="262">CatBoost</text>
</svg>
