<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" font-family="Inter, sans-serif">
  <defs>
    <style>
      .class-pos { fill: #4F7A5C; }
      .class-neg { fill: #C96A45; }
      .plane { stroke: #2B2A26; stroke-width: 2; fill: none; }
      .text { fill: #2B2A26; font-size: 11px; font-weight: 600; text-anchor: middle; }
      .label { fill: #7A756A; font-size: 10px; text-anchor: middle; }
      .arrow { fill: #C96A45; }
    </style>
    <marker id="ak2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon class="arrow" points="0 0, 10 3.5, 0 7"/>
    </marker>
  </defs>
  
  <!-- Original Space -->
  <text class="text" x="150" y="20">Original Space (2D)</text>
  
  <circle class="class-neg" cx="80" cy="80" r="8"/>
  <circle class="class-neg" cx="100" cy="100" r="8"/>
  <circle class="class-neg" cx="120" cy="80" r="8"/>
  <circle class="class-neg" cx="80" cy="120" r="8"/>
  <circle class="class-neg" cx="100" cy="140" r="8"/>
  
  <rect class="class-pos" x="140" y="72" width="14" height="14"/>
  <rect class="class-pos" x="160" y="92" width="14" height="14"/>
  <rect class="class-pos" x="140" y="112" width="14" height="14"/>
  <rect class="class-pos" x="180" y="112" width="14" height="14"/>
  <rect class="class-pos" x="160" y="132" width="14" height="14"/>
  
  <text class="label" x="150" y="170">Not separable by line</text>
  
  <!-- Arrow -->
  <text class="text" x="300" y="100" font-size="20">→</text>
  <text class="label" x="300" y="130">Kernel Trick</text>
  
  <!-- Transformed Space -->
  <text class="text" x="450" y="20">Transformed Space (3D)</text>
  
  <circle class="class-neg" cx="420" cy="60" r="8"/>
  <circle class="class-neg" cx="440" cy="80" r="8"/>
  <circle class="class-neg" cx="460" cy="60" r="8"/>
  <circle class="class-neg" cx="420" cy="100" r="8"/>
  <circle class="class-neg" cx="440" cy="120" r="8"/>
  
  <rect class="class-pos" x="480" y="100" width="14" height="14"/>
  <rect class="class-pos" x="500" y="120" width="14" height="14"/>
  <rect class="class-pos" x="480" y="140" width="14" height="14"/>
  <rect class="class-pos" x="520" y="140" width="14" height="14"/>
  <rect class="class-pos" x="500" y="150" width="14" height="14"/>
  
  <line class="plane" x1="460" y1="140" x2="540" y2="80"/>
  <text class="label" x="500" y="185">Separable by plane!</text>
</svg>
