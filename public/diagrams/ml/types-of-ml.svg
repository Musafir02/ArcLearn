<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="Inter, sans-serif">
  <defs>
    <style>
      .box { fill: #F1E0D6; stroke: #C96A45; stroke-width: 2; rx: 8; }
      .box-main { fill: #C96A45; stroke: #8B4513; stroke-width: 2; rx: 8; }
      .text { fill: #2B2A26; font-size: 13px; font-weight: 600; text-anchor: middle; }
      .text-main { fill: #fff; font-size: 16px; font-weight: 700; text-anchor: middle; }
      .text-sub { fill: #7A756A; font-size: 11px; text-anchor: middle; }
      .line { stroke: #C96A45; stroke-width: 2; fill: none; }
    </style>
  </defs>
  
  <!-- Main Box -->
  <rect class="box-main" x="350" y="10" width="200" height="50"/>
  <text class="text-main" x="450" y="42">Machine Learning</text>
  
  <!-- Lines from main -->
  <line class="line" x1="450" y1="60" x2="450" y2="90"/>
  <line class="line" x1="120" y1="90" x2="780" y2="90"/>
  <line class="line" x1="120" y1="90" x2="120" y2="110"/>
  <line class="line" x1="450" y1="90" x2="450" y2="110"/>
  <line class="line" x1="780" y1="90" x2="780" y2="110"/>
  
  <!-- Level 1 -->
  <rect class="box" x="20" y="110" width="200" height="45"/>
  <text class="text" x="120" y="138">Supervised</text>
  
  <rect class="box" x="350" y="110" width="200" height="45"/>
  <text class="text" x="450" y="138">Unsupervised</text>
  
  <rect class="box" x="680" y="110" width="200" height="45"/>
  <text class="text" x="780" y="138">Reinforcement</text>
  
  <!-- Lines Level 1 to 2 -->
  <line class="line" x1="70" y1="155" x2="70" y2="185"/>
  <line class="line" x1="170" y1="155" x2="170" y2="185"/>
  <line class="line" x1="450" y1="155" x2="450" y2="185"/>
  <line class="line" x1="720" y1="155" x2="720" y2="185"/>
  <line class="line" x1="840" y1="155" x2="840" y2="185"/>
  
  <!-- Level 2 - Supervised -->
  <rect class="box" x="0" y="185" width="140" height="45"/>
  <text class="text" x="70" y="212">Classification</text>
  <text class="text-sub" x="70" y="250">Spam Detection</text>
  
  <rect class="box" x="145" y="185" width="140" height="45"/>
  <text class="text" x="215" y="212">Regression</text>
  <text class="text-sub" x="215" y="250">House Price</text>
  
  <!-- Level 2 - Unsupervised -->
  <rect class="box" x="370" y="185" width="160" height="45"/>
  <text class="text" x="450" y="212">Clustering</text>
  <text class="text-sub" x="450" y="250">Customer Segments</text>
  
  <!-- Level 2 - Reinforcement -->
  <rect class="box" x="660" y="185" width="120" height="45"/>
  <text class="text" x="720" y="212">Q-Learning</text>
  <text class="text-sub" x="720" y="250">Game AI</text>
  
  <rect class="box" x="785" y="185" width="100" height="45"/>
  <text class="text" x="835" y="212">PPO</text>
  <text class="text-sub" x="835" y="250">Robotics</text>
  
  <!-- Self-Supervised (2026) -->
  <rect class="box" x="300" y="300" width="300" height="55"/>
  <text class="text" x="450" y="325">Self-Supervised (2026)</text>
  <text class="text-sub" x="450" y="345">GPT / Claude / Gemini</text>
  
  <line class="line" x1="450" y1="260" x2="450" y2="300" stroke-dasharray="5,5"/>
</svg>
