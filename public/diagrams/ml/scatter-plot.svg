<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" font-family="Inter, sans-serif">
  <defs>
    <style>
      .axis { stroke: #2B2A26; stroke-width: 2; }
      .point { fill: #C96A45; }
      .line { stroke: #4F7A5C; stroke-width: 3; }
      .text { fill: #2B2A26; font-size: 11px; text-anchor: middle; }
      .label { fill: #7A756A; font-size: 10px; }
      .title { fill: #2B2A26; font-size: 13px; font-weight: 600; text-anchor: middle; }
    </style>
  </defs>
  
  <text class="title" x="200" y="20">House Price vs Size</text>
  
  <!-- Axes -->
  <line class="axis" x1="60" y1="250" x2="380" y2="250"/>
  <line class="axis" x1="60" y1="250" x2="60" y2="30"/>
  
  <!-- Arrow heads -->
  <polygon fill="#2B2A26" points="380,250 374,244 374,256"/>
  <polygon fill="#2B2A26" points="60,30 54,36 66,36"/>
  
  <!-- Labels -->
  <text class="text" x="220" y="280">House Size (sq ft)</text>
  <text class="label" x="30" y="140" transform="rotate(-90, 30, 140)">Price ($K)</text>
  
  <!-- Data points -->
  <circle class="point" cx="100" cy="220" r="6"/>
  <circle class="point" cx="130" cy="200" r="6"/>
  <circle class="point" cx="150" cy="190" r="6"/>
  <circle class="point" cx="170" cy="170" r="6"/>
  <circle class="point" cx="190" cy="155" r="6"/>
  <circle class="point" cx="210" cy="140" r="6"/>
  <circle class="point" cx="230" cy="120" r="6"/>
  <circle class="point" cx="250" cy="110" r="6"/>
  <circle class="point" cx="270" cy="95" r="6"/>
  <circle class="point" cx="290" cy="80" r="6"/>
  <circle class="point" cx="310" cy="70" r="6"/>
  <circle class="point" cx="330" cy="55" r="6"/>
  
  <!-- Best fit line -->
  <line class="line" x1="80" y1="235" x2="350" y2="45"/>
  
  <!-- Annotation -->
  <text class="text" x="300" y="40" font-size="10" style="fill: #4F7A5C;">Best fit line</text>
  <text class="text" x="120" y="180" font-size="10" style="fill: #7A756A;">Each dot = one house</text>
</svg>
