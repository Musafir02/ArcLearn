<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 300" font-family="Inter, sans-serif">
  <defs>
    <style>
      .axis { stroke: #2B2A26; stroke-width: 2; }
      .good { fill: none; stroke: #4F7A5C; stroke-width: 3; }
      .bad { fill: none; stroke: #C96A45; stroke-width: 2.5; stroke-dasharray: 8,5; }
      .text { fill: #2B2A26; font-size: 12px; text-anchor: middle; }
      .label { fill: #7A756A; font-size: 11px; }
      .title { fill: #2B2A26; font-size: 14px; font-weight: 600; text-anchor: middle; }
    </style>
  </defs>
  
  <text class="title" x="225" y="22">Gradient Descent Loss Curve</text>
  
  <!-- Axes -->
  <line class="axis" x1="70" y1="250" x2="420" y2="250"/>
  <line class="axis" x1="70" y1="250" x2="70" y2="30"/>
  
  <!-- Axis labels -->
  <text class="text" x="245" y="280">Iterations →</text>
  <text class="label" x="30" y="140" transform="rotate(-90, 30, 140)">Loss →</text>
  
  <!-- High loss label at top -->
  <text class="label" x="60" y="45" text-anchor="end">High</text>
  
  <!-- Low loss label at bottom -->
  <text class="label" x="60" y="245" text-anchor="end">Low</text>
  
  <!-- Good path: starts HIGH (top-left), goes LOW (bottom-right) = loss decreases -->
  <path class="good" d="M 80,50 C 120,55 180,100 240,170 C 300,220 370,240 410,245"/>
  
  <!-- Bad path: starts high, goes HIGHER (off chart top = diverges) -->
  <path class="bad" d="M 80,50 C 110,35 150,22 200,12 C 280,5 380,2 420,2"/>
  
  <!-- Legend -->
  <line class="good" x1="180" y1="75" x2="225" y2="75"/>
  <text class="label" x="233" y="79">Good: α = 0.01 (converges)</text>
  
  <line class="bad" x1="180" y1="97" x2="225" y2="97"/>
  <text class="label" x="233" y="101">Bad: α too large (diverges)</text>
  
  <!-- Annotation arrows -->
  <text class="text" x="100" y="45" font-size="10" fill="#4F7A5C">Start: High Loss</text>
  <text class="text" x="380" y="240" font-size="10" fill="#4F7A5C">End: Low Loss ✓</text>
</svg>
